<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed | Velora Hair</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#faf8f4;
  --text:#111;
  --accent:#c7a26a;
  --muted:#777;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:650px;
  padding:40px;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.container.show{
  opacity:1;
  transform:translateY(0);
}

.icon{
  width:90px;
  height:90px;
  border:2px solid var(--accent);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:38px;
  color:var(--accent);
  margin:0 auto 30px;
  animation:floatIcon 3s ease-in-out infinite;
}

@keyframes floatIcon{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-8px); }
}

.badge{
  display:inline-block;
  padding:10px 18px;
  border:1px solid var(--accent);
  border-radius:50px;
  color:var(--accent);
  margin-bottom:25px;
  letter-spacing:1px;
  font-size:14px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:52px;
  margin-bottom:20px;
}

p{
  color:var(--muted);
  font-size:18px;
  line-height:1.7;
  margin-bottom:35px;
}

.btn{
  display:inline-block;
  padding:16px 34px;
  background:#111;
  color:#fff;
  border-radius:50px;
  text-decoration:none;
  transition:.3s;
}

.btn:hover{
  background:var(--accent);
  transform:translateY(-4px);
}

@media(max-width:768px){
  h1{
    font-size:38px;
  }

  p{
    font-size:16px;
  }
}
</style>
</head>
<body>

<div class="container" id="successBox">
  <div class="icon">✓</div>

  <div class="badge">ORDER CONFIRMED</div>

  <h1>Thank You For Your Order</h1>

  <p>
    Your luxury hair order has been received and is now being prepared.
    A confirmation email with your shipping details will arrive shortly.
  </p>

  <a href="beauty.html" class="btn">Back to Home</a>
</div>

<script>
window.addEventListener('load', () => {
  document.getElementById('successBox').classList.add('show');
});
</script>

</body>
</html>
